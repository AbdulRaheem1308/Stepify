name: CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: wellnex
          POSTGRES_PASSWORD: password
          POSTGRES_DB: wellnex
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://wellnex:password@localhost:5432/wellnex?schema=public"
      DIRECT_URL: "postgresql://wellnex:password@localhost:5432/wellnex?schema=public"
      REDIS_HOST: "localhost"
      REDIS_PORT: "6379"
      JWT_SECRET: "test-secret"

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js 20.x
      uses: actions/setup-node@v3
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Generate Prisma Client
      run: npx prisma generate

    - name: Push Prisma Schema
      run: npx prisma db push

    - name: Check Linting
      run: npm run lint

    - name: Build Application
      run: npm run build

    - name: Run Tests & Coverage
      run: npm run test:cov

    - name: SonarQube Scan
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
