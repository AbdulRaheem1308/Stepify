services:
  # 1. PostgreSQL Database
  - type: psql
    name: wellnex-db
    plan: free
    region: ohio # Change to your preferred region (e.g., frankfurt, singapore)
    databaseName: wellnex
    user: wellnex_user

  # 2. Redis Cache (using a standard Web Service running Redis image since Render requires external Redis for free tier, or we just configure a generic Redis container)
  - type: redis
    name: wellnex-redis
    plan: free
    region: ohio
    maxmemoryPolicy: noeviction

  # 3. NestJS Web Service
  - type: web
    name: wellnex-api
    env: node
    plan: free
    region: ohio
    rootDir: wellnex_backend
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: wellnex-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: wellnex-redis
          property: connectionString
      # Generate these securely before deployment!
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_EXPIRY
        value: "15m"
      - key: JWT_REFRESH_EXPIRY
        value: "7d"
      # Firebase Admin SDK Configuration (Provide these in the Render Dashboard)
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
