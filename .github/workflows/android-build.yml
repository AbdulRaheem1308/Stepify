name: Build Android APK

on:
  push:
    branches: [ "main" ]
    paths:
      - 'stepify_app/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'stepify_app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PROJECT_DIR: stepify_app

    steps:
    - uses: actions/checkout@v4

    - name: Set up Swap Space
      run: |
        sudo swapoff -a
        sudo fallocate -l 4G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        sudo swapon --show

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable

    - name: Prepare Android signing (optional)
      run: |
        if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
          mkdir -p $PROJECT_DIR/android/app
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $PROJECT_DIR/android/app/release_keystore.jks
          cat > $PROJECT_DIR/android/key.properties <<EOF
        storeFile=release_keystore.jks
        storePassword=${{ secrets.KEYSTORE_PASSWORD }}
        keyAlias=${{ secrets.KEY_ALIAS }}
        keyPassword=${{ secrets.KEY_PASSWORD }}
        EOF
        else
          echo "No keystore provided; build will use debug signing."
        fi

    - name: Clean and get dependencies
      working-directory: ${{ env.PROJECT_DIR }}
      run: |
        flutter clean
        flutter pub get

    - name: Run Unit Tests with Coverage
      working-directory: ${{ env.PROJECT_DIR }}
      run: flutter test --coverage

    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        projectBaseDir: stepify_app

    - name: Build release artifacts
      working-directory: ${{ env.PROJECT_DIR }}
      run: |
        # Build a universal release APK, an app bundle (AAB), and split per-ABI APKs with obfuscation
        flutter build apk --release --obfuscate --split-debug-info=build/app/outputs/symbols
        flutter build appbundle --release --obfuscate --split-debug-info=build/app/outputs/symbols
        flutter build apk --target-platform android-arm,android-arm64 --split-per-abi --release --obfuscate --split-debug-info=build/app/outputs/symbols

    - name: Upload APK artifacts
      uses: actions/upload-artifact@v4
      with:
        name: stepify-apks
        path: |
          ${{ env.PROJECT_DIR }}/build/app/outputs/flutter-apk/*.apk

    - name: Upload AAB artifact
      uses: actions/upload-artifact@v4
      with:
        name: stepify-aab
        path: ${{ env.PROJECT_DIR }}/build/app/outputs/bundle/release/*.aab
