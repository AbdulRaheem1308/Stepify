name: Build iOS App

on:
  push:
    branches: [ "main" ]
    paths:
      - 'wellnex_app/**'
      - '.github/workflows/ios-build.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'wellnex_app/**'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      PROJECT_DIR: wellnex_app

    steps:
    - uses: actions/checkout@v4

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable

    - name: Disable Swift Package Manager globally
      run: flutter config --no-enable-swift-package-manager

    - name: Clean and get dependencies
      working-directory: ${{ env.PROJECT_DIR }}
      run: |
        flutter clean
        flutter pub get
        flutter precache --ios

    - name: Build iOS IPA (Unsigned)
      working-directory: ${{ env.PROJECT_DIR }}
      run: |
        flutter build ipa --no-codesign --release --obfuscate --split-debug-info=build/ios/symbols

    - name: Compress iOS Build Output
      working-directory: ${{ env.PROJECT_DIR }}/build/ios/archive
      run: |
        zip -r Runner.xcarchive.zip Runner.xcarchive

    - name: Upload Unsigned IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: wellnex-ios-ipa
        path: ${{ env.PROJECT_DIR }}/build/ios/ipa/*.ipa

    - name: Upload xcarchive artifact
      uses: actions/upload-artifact@v4
      with:
        name: wellnex-ios-xcarchive
        path: ${{ env.PROJECT_DIR }}/build/ios/archive/Runner.xcarchive.zip
