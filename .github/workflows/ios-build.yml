name: Build iOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      PROJECT_DIR: stepify_app

    steps:
    - uses: actions/checkout@v4

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable

    - name: Flutter pub get
      working-directory: ${{ env.PROJECT_DIR }}
      run: flutter pub get

    - name: Generate Flutter iOS configuration files
      working-directory: ${{ env.PROJECT_DIR }}
      run: flutter build ios --config-only --no-codesign

    - name: Install CocoaPods
      working-directory: ${{ env.PROJECT_DIR }}/ios
      run: |
        pod repo update
        pod install

    - name: Build iOS IPA (Unsigned)
      working-directory: ${{ env.PROJECT_DIR }}
      run: |
        flutter build ipa --no-codesign --release

    - name: Compress iOS Build Output
      working-directory: ${{ env.PROJECT_DIR }}/build/ios/archive
      run: |
        zip -r Runner.xcarchive.zip Runner.xcarchive

    - name: Upload Unsigned IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: stepify-ios-ipa
        path: ${{ env.PROJECT_DIR }}/build/ios/ipa/*.ipa

    - name: Upload xcarchive artifact
      uses: actions/upload-artifact@v4
      with:
        name: stepify-ios-xcarchive
        path: ${{ env.PROJECT_DIR }}/build/ios/archive/Runner.xcarchive.zip
