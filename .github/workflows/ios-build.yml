name: Build iOS App

on:
  push:
    branches: [ "main" ]
    paths:
      - 'stepify_app/**'
      - '.github/workflows/ios-build.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'stepify_app/**'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      PROJECT_DIR: stepify_app

    steps:
    - uses: actions/checkout@v4

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable

    - name: Disable Swift Package Manager globally
      run: flutter config --no-enable-swift-package-manager

    - name: Clean and get dependencies
      working-directory: ${{ env.PROJECT_DIR }}
      run: |
        flutter clean
        flutter pub get
        flutter precache --ios

    - name: Pre-populate podhelper.rb from Flutter SDK
      run: |
        mkdir -p ${{ env.PROJECT_DIR }}/ios/Flutter
        cp ${{ env.FLUTTER_ROOT }}/packages/flutter_tools/bin/podhelper.rb ${{ env.PROJECT_DIR }}/ios/Flutter/

    - name: Generate Flutter iOS configuration files
      working-directory: ${{ env.PROJECT_DIR }}
      run: |
        flutter build ios --config-only --no-codesign || {
          echo "⚠️ flutter build ios failed! Running verbose pod install to print detailed errors..."
          cd ios
          pod install --verbose
          exit 1
        }

    - name: Install CocoaPods
      working-directory: ${{ env.PROJECT_DIR }}/ios
      run: |
        pod repo update
        pod install

    - name: Build iOS IPA (Unsigned)
      working-directory: ${{ env.PROJECT_DIR }}
      run: |
        flutter build ipa --no-codesign --release --obfuscate --split-debug-info=build/ios/symbols

    - name: Compress iOS Build Output
      working-directory: ${{ env.PROJECT_DIR }}/build/ios/archive
      run: |
        zip -r Runner.xcarchive.zip Runner.xcarchive

    - name: Upload Unsigned IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: stepify-ios-ipa
        path: ${{ env.PROJECT_DIR }}/build/ios/ipa/*.ipa

    - name: Upload xcarchive artifact
      uses: actions/upload-artifact@v4
      with:
        name: stepify-ios-xcarchive
        path: ${{ env.PROJECT_DIR }}/build/ios/archive/Runner.xcarchive.zip
