name: Backend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'stepify_backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'stepify_backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./stepify_backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: stepify_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        node-version: [22.x]

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/stepify_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/stepify_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_SECRET: ci-test-jwt-secret
      JWT_REFRESH_SECRET: ci-test-jwt-refresh-secret
      JWT_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      NODE_ENV: test
      OTP_EXPIRY_MINUTES: 5
      OTP_LENGTH: 6
      POINTS_PER_STEP: 0.1
      AD_REWARD_POINTS: 10
      AD_COOLDOWN_MINUTES: 5

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of Sonar analysis

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: './stepify_backend/package-lock.json'

    - name: Install dependencies
      run: npm ci

    - name: Generate Prisma Client
      run: npx prisma generate

    - name: Push database schema
      run: npx prisma db push --accept-data-loss

    - name: Lint Code
      run: npm run lint

    - name: Run Unit & E2E Tests with Coverage
      run: |
        npm run test:cov
        npm run test:e2e -- --passWithNoTests

    - name: Build Backend
      run: npm run build

    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        projectBaseDir: stepify_backend
