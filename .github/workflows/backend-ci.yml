name: Backend CI & Security

on:
  push:
    branches: [ "main" ]
    paths:
      - 'stepify_backend/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'stepify_backend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stepify_backend

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: stepify_backend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Run ESLint
      run: npm run lint

    - name: Security Check (npm audit)
      run: npm audit --audit-level=high

    - name: Build NestJS App
      run: npm run build
