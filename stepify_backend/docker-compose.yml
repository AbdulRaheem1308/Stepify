version: '3.8'

services:
  # -------------------------------------------------
  # NestJS Backend API
  # -------------------------------------------------
  backend:
    build: .
    container_name: stepify_backend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - DATABASE_URL=postgresql://postgres:local%40SQl123@host.docker.internal:5432/stepify?schema=public
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # -------------------------------------------------
  # Redis Cache
  # -------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: stepify_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
