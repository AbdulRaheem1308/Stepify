include: package:flutter_lints/flutter.yaml

analyzer:
  errors:
    # Suppress const-related warnings
    prefer_const_constructors: ignore
    prefer_const_literals_to_create_immutables: ignore
    prefer_const_declarations: ignore
    # Suppress deprecation warnings
    deprecated_member_use: ignore
    deprecated_member_use_from_same_package: ignore
    # Suppress unused warnings
    unused_import: ignore
    unused_local_variable: ignore
    unused_element: ignore
    unused_field: ignore
    unused_catch_clause: ignore
    dead_code: ignore
    # Suppress async warnings
    use_build_context_synchronously: ignore
    # Suppress doc comment warnings
    dangling_library_doc_comments: ignore
    # Suppress other non-critical warnings
    undefined_hidden_name: ignore
    curly_braces_in_flow_control_structures: ignore
    unnecessary_brace_in_string_interps: ignore
    unnecessary_string_interpolations: ignore

linter:
  rules:
    prefer_const_constructors: false
    prefer_const_declarations: false
    prefer_const_literals_to_create_immutables: false
    avoid_print: false
    deprecated_consistency: false
    library_private_types_in_public_api: false
    use_key_in_widget_constructors: false
    curly_braces_in_flow_control_structures: false
    unnecessary_brace_in_string_interps: false
    unnecessary_string_interpolations: false
