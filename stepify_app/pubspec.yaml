name: stepify_app
description: "Stepify - Walk, Track, Earn Rewards"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Navigation
  go_router: ^13.0.1
  
  # Networking
  dio: ^5.4.0
  socket_io_client: ^2.0.3+1
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # UI Components
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  
  # Animations
  lottie: ^3.0.0
  flutter_animate: ^4.3.0
  
  # Charts
  fl_chart: ^0.66.0
  
  # Step Counting
  pedometer_2: ^5.0.4
  permission_handler: ^11.1.0
  health: 13.2.1
  
  # Ads (AdMob)
  google_mobile_ads: ^5.1.0
  
  # Utils
  intl: 0.20.2
  uuid: ^4.2.2
  crypto: ^3.0.3
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  
  # Icons
  cupertino_icons: ^1.0.6
  iconsax: ^0.0.8
  intl_phone_field: ^3.2.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  confetti: ^0.7.0
  share_plus: ^10.1.4
  url_launcher: ^6.2.2
  timeago: ^3.7.1
  workmanager: ^0.9.0+3
  firebase_core: ^3.6.0
  firebase_analytics: ^11.3.0
  firebase_crashlytics: ^4.1.3
  firebase_remote_config: ^5.1.3
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0
  in_app_review: ^2.0.11
  screenshot: ^3.0.0
  path_provider: ^2.1.5
  font_awesome_flutter: ^11.0.0
  safe_device: ^1.3.10
  posthog_flutter: ^5.24.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  generate: true
  uses-material-design: true
  config:
    enable-swift-package-manager: false
  
  assets:
    - assets/images/
    - assets/animations/

